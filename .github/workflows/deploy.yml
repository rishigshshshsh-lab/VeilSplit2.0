name: Deploy Contracts to Testnet
on:
  workflow_dispatch:
env:
  CARGO_TERM_COLOR: always
jobs:
  deploy:
    name: Deploy to Testnet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./contract
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
      - name: Cache cargo registry and binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            contract/target
          key: ${{ runner.os }}-cargo-deploy-${{ hashFiles('**/Cargo.lock') }}
      # Installs cargo-binstall instantly
      - name: Install cargo-binstall
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      # Installs stellar-cli in 3 seconds using the precompiled binary
      - name: Install Stellar CLI
        run: cargo binstall --no-confirm stellar-cli
      # Build standard wasm and optimize it
      - name: Build contracts
        run: |
          stellar contract build
          stellar contract optimize --wasm target/wasm32v1-none/release/bill_registry.wasm
          stellar contract optimize --wasm target/wasm32v1-none/release/stealth_pay.wasm
          stellar contract optimize --wasm target/wasm32v1-none/release/split_bill_registry.wasm
          stellar contract optimize --wasm target/wasm32v1-none/release/split_notifier.wasm
      # Deploy the optimized contract
      - name: Deploy to Testnet
        run: |
          echo "Generating identities..."
          stellar keys generate deployer --network testnet
          stellar keys fund deployer --network testnet
          
          echo "Deploying Contracts..."
          stellar contract deploy \
            --wasm target/wasm32v1-none/release/bill_registry.optimized.wasm \
            --source deployer \
            --network testnet
          
          stellar contract deploy \
            --wasm target/wasm32v1-none/release/stealth_pay.optimized.wasm \
            --source deployer \
            --network testnet
            
          stellar contract deploy \
            --wasm target/wasm32v1-none/release/split_bill_registry.optimized.wasm \
            --source deployer \
            --network testnet
            
          stellar contract deploy \
            --wasm target/wasm32v1-none/release/split_notifier.optimized.wasm \
            --source deployer \
            --network testnet
